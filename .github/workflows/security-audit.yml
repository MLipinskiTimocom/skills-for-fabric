name: Security Audit - Prompt Injection Detection

on:
  pull_request:
    branches: [ main, master ]
    paths: 
      - 'skills/**/*.md'
      - '.github/skills/**/*.md'
  push:
    branches: [ main, master ]
    paths:
      - 'skills/**/*.md' 
      - '.github/skills/**/*.md'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  pull-requests: write

jobs:
  security-audit:
    runs-on: ubuntu-latest
    name: 🛡️ Security Audit - Prompt Injection Detection
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyYAML
        
    - name: Run Security Scan
      id: security-scan
      run: |
        python .github/workflows/security_scanner.py
        
    - name: Upload Security Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: security-report.json
        retention-days: 30
        
    - name: Comment PR with Security Results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          // Read security report if it exists
          let reportContent = '## 🛡️ Security Audit Results\n\n';
          
          try {
            const report = JSON.parse(fs.readFileSync('security-report.json', 'utf8'));
            
            if (report.overall_status === 'SAFE') {
              reportContent += '✅ **PASSED** - No security risks detected\n\n';
              reportContent += `- Files scanned: ${report.files_scanned}\n`;
              reportContent += `- Total checks: ${report.total_checks}\n`;
              reportContent += '- No prompt injection risks found\n';
              reportContent += '- No sensitive information detected\n';
              reportContent += '- No malicious code patterns found\n';
            } else {
              reportContent += '⚠️ **REVIEW REQUIRED** - Security issues detected\n\n';
              
              if (report.injection_risks > 0) {
                reportContent += `🚨 **${report.injection_risks} prompt injection risk(s)** - CRITICAL\n`;
              }
              if (report.sensitive_info > 0) {
                reportContent += `⚠️ ${report.sensitive_info} sensitive information item(s) found\n`;
              }
              if (report.malicious_code > 0) {
                reportContent += `🚨 **${report.malicious_code} malicious code pattern(s)** - CRITICAL\n`;
              }
              
              reportContent += '\n### Action Required\n';
              if (report.injection_risks > 0 || report.malicious_code > 0) {
                reportContent += '❌ **This PR cannot be merged until critical security issues are resolved.**\n';
              } else {
                reportContent += '🔍 Review and sanitize sensitive information before merging.\n';
              }
            }
          } catch (error) {
            reportContent += '❌ **ERROR** - Could not read security report\n';
          }
          
          // Find existing comment or create new one
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          
          const existingComment = comments.find(comment => 
            comment.user.type === 'Bot' && comment.body.includes('Security Audit Results')
          );
          
          if (existingComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existingComment.id,
              body: reportContent
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: reportContent
            });
          }