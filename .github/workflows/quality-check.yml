name: Skill Quality Check

on:
  pull_request:
    branches: [ main, master ]
    paths: 
      - 'skills/**/*.md'
  push:
    branches: [ main, master ]
    paths:
      - 'skills/**/*.md'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  pull-requests: write

jobs:
  quality-check:
    runs-on: ubuntu-latest
    name: 🔍 Skill Quality Check
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyYAML requests
        
    - name: Run Quality Check
      id: quality-check
      run: |
        python .github/workflows/quality_checker.py
        
    - name: Upload Quality Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: quality-report
        path: quality-report.json
        retention-days: 30
        
    - name: Comment PR with Quality Results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          let reportContent = '## 🔍 Skill Quality Check Results\n\n';
          
          try {
            const report = JSON.parse(fs.readFileSync('quality-report.json', 'utf8'));
            
            // Summary
            reportContent += `**Files scanned:** ${report.files_scanned}\n`;
            reportContent += `**Critical issues:** ${report.critical_count}\n`;
            reportContent += `**Warnings:** ${report.warning_count}\n\n`;
            
            if (report.overall_status === 'PASSED') {
              reportContent += '✅ **All quality checks passed!**\n\n';
            } else if (report.overall_status === 'CRITICAL') {
              reportContent += '❌ **Critical issues found - PR cannot be merged**\n\n';
            } else {
              reportContent += '⚠️ **Warnings found - please review**\n\n';
            }
            
            // Semantic Disambiguation
            if (report.semantic_conflicts && report.semantic_conflicts.length > 0) {
              reportContent += '### 🔀 Semantic Conflicts\n';
              for (const conflict of report.semantic_conflicts) {
                reportContent += `- 🚨 **${conflict.skill1}** and **${conflict.skill2}**: ${conflict.reason}\n`;
              }
              reportContent += '\n';
            }
            
            // Trigger Phrase Duplicates
            if (report.duplicate_triggers && report.duplicate_triggers.length > 0) {
              reportContent += '### 🎯 Duplicate Trigger Phrases\n';
              for (const dup of report.duplicate_triggers) {
                reportContent += `- 🚨 Trigger "${dup.trigger}" used by: ${dup.skills.join(', ')}\n`;
              }
              reportContent += '\n';
            }
            
            // Broken Cross-References
            if (report.broken_references && report.broken_references.length > 0) {
              reportContent += '### 🔗 Broken Cross-References\n';
              for (const ref of report.broken_references) {
                reportContent += `- 🚨 **${ref.skill}**: \`${ref.path}\` not found\n`;
              }
              reportContent += '\n';
            }
            
            // Semantically Ambiguous Triggers
            if (report.ambiguous_triggers && report.ambiguous_triggers.length > 0) {
              reportContent += '### ⚠️ Semantically Ambiguous Triggers\n\n';
              reportContent += '| Trigger Phrase | Matches These Skills | Ambiguity |\n';
              reportContent += '|----------------|---------------------|------------|\n';
              for (const amb of report.ambiguous_triggers) {
                const skills = amb.skills.map(s => s.skill).join(', ');
                reportContent += `| ${amb.trigger_phrase} | ${skills} | ${amb.skills.length} skills |\n`;
              }
              reportContent += '\n';
            }
            
            // Similarity Matrix
            if (report.similarity_matrix && report.similarity_matrix.skills) {
              const skills = report.similarity_matrix.skills;
              const matrix = report.similarity_matrix.matrix;
              
              reportContent += '### 📊 Skill Similarity Matrix (Jaccard)\n\n';
              
              // Header
              reportContent += '| Skill |';
              for (const s of skills) {
                reportContent += ` ${s.substring(0, 12)} |`;
              }
              reportContent += '\n|-------|';
              for (const s of skills) {
                reportContent += '------------|';
              }
              reportContent += '\n';
              
              // Rows
              for (let i = 0; i < skills.length; i++) {
                reportContent += `| ${skills[i]} |`;
                for (let j = 0; j < skills.length; j++) {
                  if (i === j) {
                    reportContent += ' --- |';
                  } else {
                    const val = matrix[i][j];
                    const pct = Math.round(val * 100);
                    let icon = '';
                    if (val >= 0.3) icon = ' 🚨';
                    else if (val >= 0.2) icon = ' ⚠️';
                    reportContent += ` ${pct}%${icon} |`;
                  }
                }
                reportContent += '\n';
              }
              reportContent += '\n_Legend: 🚨 >30% (critical overlap), ⚠️ 20-30% (review recommended)_\n\n';
            }
            
            // Structural Issues
            if (report.structural_issues && report.structural_issues.length > 0) {
              reportContent += '### 📋 Structural Issues\n';
              for (const issue of report.structural_issues) {
                const icon = issue.severity === 'CRITICAL' ? '🚨' : '⚠️';
                reportContent += `- ${icon} **${issue.skill}**: ${issue.message}\n`;
              }
              reportContent += '\n';
            }
            
            // Content Warnings
            if (report.content_warnings && report.content_warnings.length > 0) {
              reportContent += '### 📝 Content Warnings\n';
              for (const warn of report.content_warnings) {
                reportContent += `- ⚠️ **${warn.skill}**: ${warn.message}\n`;
              }
              reportContent += '\n';
            }
            
            // Per-skill checklist
            if (report.skills && Object.keys(report.skills).length > 0) {
              reportContent += '### 📊 Per-Skill Checklist\n\n';
              reportContent += '| Skill | Frontmatter | Update Notice | Must/Prefer/Avoid | Examples | Code Blocks |\n';
              reportContent += '|-------|-------------|---------------|-------------------|----------|-------------|\n';
              for (const [skill, checks] of Object.entries(report.skills)) {
                const fm = checks.has_frontmatter ? '✅' : '❌';
                const un = checks.has_update_notice ? '✅' : '❌';
                const mpa = checks.has_must_prefer_avoid ? '✅' : '⚠️';
                const ex = checks.has_examples ? '✅' : '⚠️';
                const cb = checks.code_blocks_tagged ? '✅' : '⚠️';
                reportContent += `| ${skill} | ${fm} | ${un} | ${mpa} | ${ex} | ${cb} |\n`;
              }
              reportContent += '\n';
            }
            
          } catch (error) {
            reportContent += '❌ **ERROR** - Could not read quality report: ' + error.message + '\n';
          }
          
          // Find existing comment or create new one
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          
          const existingComment = comments.find(comment => 
            comment.user.type === 'Bot' && comment.body.includes('Skill Quality Check Results')
          );
          
          if (existingComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existingComment.id,
              body: reportContent
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: reportContent
            });
          }
