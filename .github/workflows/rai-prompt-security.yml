# RAI Prompt Security Scanner
# Scans skill prompts for dangerous patterns and injection vulnerabilities

name: RAI Prompt Security

on:
  pull_request:
    branches: [main, bocrivat_main]
    paths:
      - 'skills/**'
      - 'common/**'
  push:
    branches: [main, bocrivat_main]
    paths:
      - 'skills/**'
      - 'common/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  prompt-lint:
    name: Scan for Prompt Injection Patterns
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      
      - name: Set up Python
        uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.2.0
        with:
          python-version: '3.11'
      
      - name: Run prompt security scanner
        run: |
          python .github/scripts/scan_prompt_security.py --path skills/ --strict
      
      - name: Comment results on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Prompt Security Scan Failed**\n\nDangerous patterns detected in skill prompts. Please review the workflow logs for details.'
            })
